<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>LUMOO | My Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-[#f9f9f9] text-gray-900 font-['Inter']">

    <nav class="flex justify-between items-center px-12 py-6 bg-white shadow-sm sticky top-0 z-50">
        <a href="/">
            <img th:src="@{/images/logo.jpg}" alt="LUMOO Logo" class="h-12 w-auto object-contain">
        </a>
        <div class="flex items-center space-x-8 text-[10px] uppercase tracking-[0.2em] font-bold">
            <a th:if="${user.role.name() == 'ADMIN'}"  href="/admin/dashboard"  class="hover:text-blue-600 transition">← Admin Dashboard</a>
            <a th:if="${user.role.name() == 'VENDOR'}" href="/vendor/dashboard" class="hover:text-blue-600 transition">← Vendor Hub</a>
            <a th:if="${user.role.name() == 'USER'}"   href="/buyer/dashboard"  class="hover:text-blue-600 transition">← My Orders</a>
            <form th:action="@{/logout}" method="post" class="inline">
                <button type="submit" class="text-red-500 hover:text-red-700 transition">Logout</button>
            </form>
        </div>
    </nav>

    <main class="max-w-3xl mx-auto px-6 py-16">

        <!-- Header -->
        <div class="flex items-center gap-6 mb-12">
            <div class="relative group">
                <img th:if="${user.profilePicture != null}"
                     th:src="${user.profilePicture}"
                     class="w-20 h-20 rounded-full object-cover border-2 border-blue-600" alt="Profile">
                <div th:if="${user.profilePicture == null}"
                     class="w-20 h-20 rounded-full bg-blue-600 flex items-center justify-center text-white text-3xl font-bold"
                     th:text="${#strings.toUpperCase(#strings.substring(user.email, 0, 1))}">U</div>
            </div>
            <div>
                <h1 class="text-2xl font-bold tracking-tight"
                    th:text="${user.fullName != null and !user.fullName.isEmpty() ? user.fullName : user.email}">Name</h1>
                <div class="flex items-center gap-3 mt-1">
                    <span class="text-sm text-gray-400" th:text="${user.email}">email</span>
                    <span class="text-[9px] font-black px-2.5 py-0.5 uppercase tracking-widest rounded-full"
                          th:text="${user.role}"
                          th:classappend="${user.role.name() == 'ADMIN'  ? 'bg-violet-100 text-violet-700' :
                                           user.role.name() == 'VENDOR' ? 'bg-blue-100 text-blue-700' :
                                                                          'bg-gray-100 text-gray-600'}">
                    </span>
                </div>
            </div>
        </div>

        <!-- Flash messages -->
        <div th:if="${success}" class="mb-6 border-l-4 border-green-500 bg-green-50 px-6 py-3">
            <p class="text-xs font-bold text-green-700 uppercase tracking-widest" th:text="${success}"></p>
        </div>
        <div th:if="${error}" class="mb-6 border-l-4 border-red-400 bg-red-50 px-6 py-3">
            <p class="text-xs font-bold text-red-600 uppercase tracking-widest" th:text="${error}"></p>
        </div>
        <div th:if="${passwordSuccess}" class="mb-6 border-l-4 border-green-500 bg-green-50 px-6 py-3">
            <p class="text-xs font-bold text-green-700 uppercase tracking-widest" th:text="${passwordSuccess}"></p>
        </div>
        <div th:if="${passwordError}" class="mb-6 border-l-4 border-red-400 bg-red-50 px-6 py-3">
            <p class="text-xs font-bold text-red-600 uppercase tracking-widest" th:text="${passwordError}"></p>
        </div>

        <!-- Edit Profile -->
        <div class="bg-white border border-gray-100 shadow-sm p-10 mb-6">
            <h2 class="text-[9px] font-black uppercase tracking-[0.4em] text-gray-400 mb-8">Profile Information</h2>

            <form action="/profile/update" method="post" enctype="multipart/form-data" class="space-y-6">

                <!-- Profile Picture -->
                <div>
                    <label class="block text-[9px] font-black uppercase tracking-[0.3em] text-gray-400 mb-3">Profile Picture</label>
                    <div class="flex items-center gap-5">
                        <div id="previewWrap">
                            <img th:if="${user.profilePicture != null}"
                                 th:src="${user.profilePicture}"
                                 id="avatarPreview"
                                 class="w-16 h-16 rounded-full object-cover border border-gray-200">
                            <div th:if="${user.profilePicture == null}"
                                 id="avatarPlaceholder"
                                 class="w-16 h-16 rounded-full bg-blue-600 flex items-center justify-center text-white text-xl font-bold"
                                 th:text="${#strings.toUpperCase(#strings.substring(user.email, 0, 1))}">U</div>
                        </div>
                        <label class="cursor-pointer bg-gray-100 hover:bg-blue-50 border border-gray-200 hover:border-blue-400 px-4 py-2 text-[9px] font-black uppercase tracking-widest transition">
                            Choose Photo
                            <input type="file" name="avatar" accept="image/*" class="hidden" id="avatarInput" onchange="previewAvatar(event)">
                        </label>
                        <span class="text-[9px] text-gray-300 uppercase">JPG, PNG — max 5MB</span>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-6">
                    <div>
                        <label class="block text-[9px] font-black uppercase tracking-[0.3em] text-gray-400 mb-2">Full Name</label>
                        <input type="text" name="fullName"
                               th:value="${user.fullName}"
                               placeholder="John Smith"
                               class="w-full border-b border-gray-200 py-2.5 text-sm bg-transparent focus:border-blue-500 outline-none transition">
                    </div>
                    <div>
                        <label class="block text-[9px] font-black uppercase tracking-[0.3em] text-gray-400 mb-2">Phone Number</label>
                        <input type="tel" name="phone"
                               th:value="${user.phone}"
                               placeholder="+220 XXX XXXX"
                               class="w-full border-b border-gray-200 py-2.5 text-sm bg-transparent focus:border-blue-500 outline-none transition">
                    </div>
                </div>

                <div>
                    <label class="block text-[9px] font-black uppercase tracking-[0.3em] text-gray-400 mb-2">Delivery Address</label>
                    <textarea name="address" rows="2"
                              th:text="${user.address}"
                              placeholder="Street, City, Region"
                              class="w-full border-b border-gray-200 py-2.5 text-sm bg-transparent focus:border-blue-500 outline-none transition resize-none"></textarea>
                </div>

                <div>
                    <label class="block text-[9px] font-black uppercase tracking-[0.3em] text-gray-400 mb-2">Email Address</label>
                    <input type="text" th:value="${user.email}" disabled
                           class="w-full border-b border-gray-100 py-2.5 text-sm text-gray-300 bg-transparent cursor-not-allowed">
                    <p class="text-[9px] text-gray-300 mt-1">Email cannot be changed.</p>
                </div>

                <button type="submit"
                        class="bg-black text-white px-10 py-3 text-[10px] font-black uppercase tracking-[0.3em] hover:bg-blue-600 transition duration-300">
                    Save Changes →
                </button>
            </form>
        </div>

        <!-- Change Password -->
        <div class="bg-white border border-gray-100 shadow-sm p-10">
            <h2 class="text-[9px] font-black uppercase tracking-[0.4em] text-gray-400 mb-8">Change Password</h2>

            <form action="/profile/change-password" method="post" class="space-y-6" id="pwForm">

                <div>
                    <label class="block text-[9px] font-black uppercase tracking-[0.3em] text-gray-400 mb-2">Current Password</label>
                    <input type="password" name="currentPassword" required
                           placeholder="••••••••"
                           class="w-full border-b border-gray-200 py-2.5 text-sm bg-transparent focus:border-blue-500 outline-none transition">
                </div>

                <div class="grid grid-cols-2 gap-6">
                    <div>
                        <label class="block text-[9px] font-black uppercase tracking-[0.3em] text-gray-400 mb-2">New Password</label>
                        <input type="password" name="newPassword" id="newPw" required
                               placeholder="••••••••"
                               class="w-full border-b border-gray-200 py-2.5 text-sm bg-transparent focus:border-blue-500 outline-none transition">
                    </div>
                    <div>
                        <label class="block text-[9px] font-black uppercase tracking-[0.3em] text-gray-400 mb-2">Confirm New Password</label>
                        <input type="password" name="confirmPassword" id="confirmPw" required
                               placeholder="••••••••"
                               class="w-full border-b border-gray-200 py-2.5 text-sm bg-transparent focus:border-blue-500 outline-none transition">
                        <p id="pwError" class="text-red-500 text-[9px] mt-1 hidden">Passwords do not match.</p>
                    </div>
                </div>

                <button type="submit" id="pwBtn"
                        class="bg-black text-white px-10 py-3 text-[10px] font-black uppercase tracking-[0.3em] hover:bg-blue-600 transition duration-300">
                    Update Password →
                </button>
            </form>
        </div>

    </main>

    <footer class="text-center py-10">
        <p class="text-[9px] text-gray-300 uppercase tracking-widest">© 2026 LUMOO — Building the Nation</p>
    </footer>

    <script>
        function previewAvatar(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const existing = document.getElementById('avatarPreview');
                const placeholder = document.getElementById('avatarPlaceholder');
                if (existing) {
                    existing.src = e.target.result;
                } else {
                    if (placeholder) placeholder.remove();
                    const img = document.createElement('img');
                    img.id = 'avatarPreview';
                    img.src = e.target.result;
                    img.className = 'w-16 h-16 rounded-full object-cover border border-gray-200';
                    document.getElementById('previewWrap').appendChild(img);
                }
            };
            reader.readAsDataURL(file);
        }

        const newPw     = document.getElementById('newPw');
        const confirmPw = document.getElementById('confirmPw');
        const pwError   = document.getElementById('pwError');
        const pwBtn     = document.getElementById('pwBtn');

        function validatePw() {
            const mismatch = confirmPw.value && newPw.value !== confirmPw.value;
            pwError.classList.toggle('hidden', !mismatch);
            pwBtn.disabled = mismatch;
            pwBtn.classList.toggle('opacity-40', mismatch);
        }

        newPw.addEventListener('input', validatePw);
        confirmPw.addEventListener('input', validatePw);
    </script>

    <div th:replace="~{fragments/loading :: loading}"></div>
</body>
</html>
