<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>LUMOO | Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>* { font-family: 'DM Sans', sans-serif; }</style>
</head>
<body class="bg-slate-50 min-h-screen">

    <!-- Nav — ikut role -->
    <nav class="bg-white border-b border-slate-200 px-8 py-4 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-blue-500 rounded-lg flex items-center justify-center">
                <span class="text-white font-bold text-sm">L</span>
            </div>
            <span class="font-semibold text-slate-800">Lumoo</span>
        </div>
        <div class="flex items-center gap-6 text-sm">
            <a th:if="${user.role.name() == 'ADMIN'}"  href="/admin/dashboard"  class="text-slate-500 hover:text-slate-800 transition">← Admin Dashboard</a>
            <a th:if="${user.role.name() == 'VENDOR'}" href="/vendor/dashboard" class="text-slate-500 hover:text-slate-800 transition">← Vendor Dashboard</a>
            <a th:if="${user.role.name() == 'USER'}"   href="/buyer/dashboard"  class="text-slate-500 hover:text-slate-800 transition">← My Orders</a>
            <a href="/logout" class="text-slate-400 hover:text-red-500 transition text-xs">Logout</a>
        </div>
    </nav>

    <main class="max-w-3xl mx-auto px-6 py-12">

        <!-- Header -->
        <div class="flex items-center gap-5 mb-10">
            <div class="w-16 h-16 rounded-full bg-blue-600 flex items-center justify-center text-white text-2xl font-bold"
                 th:text="${#strings.toUpperCase(#strings.substring(user.email, 0, 1))}">U</div>
            <div>
                <h1 class="text-2xl font-bold text-slate-900"
                    th:text="${user.fullName != null and !user.fullName.isEmpty() ? user.fullName : user.email}">Name</h1>
                <div class="flex items-center gap-3 mt-1">
                    <span class="text-sm text-slate-500" th:text="${user.email}">email</span>
                    <span class="text-xs font-semibold px-2.5 py-0.5 rounded-full"
                          th:text="${user.role}"
                          th:classappend="${user.role.name() == 'ADMIN'  ? 'bg-violet-100 text-violet-700' :
                                           user.role.name() == 'VENDOR' ? 'bg-blue-100 text-blue-700' :
                                                                          'bg-slate-100 text-slate-600'}">
                    </span>
                </div>
            </div>
        </div>

        <!-- Flash messages -->
        <div th:if="${success}" class="mb-6 bg-green-50 border border-green-200 rounded-xl p-4">
            <p class="text-sm font-semibold text-green-700" th:text="${success}"></p>
        </div>
        <div th:if="${passwordSuccess}" class="mb-6 bg-green-50 border border-green-200 rounded-xl p-4">
            <p class="text-sm font-semibold text-green-700" th:text="${passwordSuccess}"></p>
        </div>
        <div th:if="${passwordError}" class="mb-6 bg-red-50 border border-red-200 rounded-xl p-4">
            <p class="text-sm font-semibold text-red-700" th:text="${passwordError}"></p>
        </div>

        <!-- Edit Profile -->
        <div class="bg-white rounded-xl border border-slate-200 p-8 mb-6">
            <h2 class="text-sm font-semibold text-slate-800 mb-6">Maklumat Profil</h2>

            <form action="/profile/update" method="post" class="space-y-5">

                <div class="grid grid-cols-2 gap-5">
                    <div>
                        <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Nama Penuh</label>
                        <input type="text" name="fullName"
                               th:value="${user.fullName}"
                               placeholder="Ahmad bin Ali"
                               class="w-full border border-slate-200 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">No. Telefon</label>
                        <input type="tel" name="phone"
                               th:value="${user.phone}"
                               placeholder="011-12345678"
                               class="w-full border border-slate-200 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Alamat</label>
                    <textarea name="address" rows="2"
                              th:text="${user.address}"
                              placeholder="No. 12, Jalan Contoh, 50000 Kuala Lumpur"
                              class="w-full border border-slate-200 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 transition resize-none"></textarea>
                </div>

                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Email</label>
                    <input type="text" th:value="${user.email}" disabled
                           class="w-full border border-slate-100 rounded-lg px-4 py-2.5 text-sm bg-slate-50 text-slate-400 cursor-not-allowed">
                    <p class="text-[10px] text-slate-400 mt-1">Email tidak boleh ditukar.</p>
                </div>

                <button type="submit"
                        class="bg-slate-900 hover:bg-blue-600 text-white px-6 py-2.5 rounded-lg text-sm font-semibold transition-colors">
                    Simpan Perubahan
                </button>
            </form>
        </div>

        <!-- Change Password -->
        <div class="bg-white rounded-xl border border-slate-200 p-8">
            <h2 class="text-sm font-semibold text-slate-800 mb-6">Tukar Password</h2>

            <form action="/profile/change-password" method="post" class="space-y-5" id="pwForm">

                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Password Semasa</label>
                    <input type="password" name="currentPassword" required
                           placeholder="••••••••"
                           class="w-full border border-slate-200 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
                </div>

                <div class="grid grid-cols-2 gap-5">
                    <div>
                        <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Password Baru</label>
                        <input type="password" name="newPassword" id="newPw" required
                               placeholder="••••••••"
                               class="w-full border border-slate-200 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Sahkan Password Baru</label>
                        <input type="password" name="confirmPassword" id="confirmPw" required
                               placeholder="••••••••"
                               class="w-full border border-slate-200 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
                        <p id="pwError" class="text-red-500 text-[10px] mt-1 hidden">Password tidak sepadan.</p>
                    </div>
                </div>

                <button type="submit" id="pwBtn"
                        class="bg-slate-900 hover:bg-blue-600 text-white px-6 py-2.5 rounded-lg text-sm font-semibold transition-colors">
                    Tukar Password
                </button>
            </form>
        </div>

    </main>

    <script>
        const newPw    = document.getElementById('newPw');
        const confirmPw = document.getElementById('confirmPw');
        const pwError  = document.getElementById('pwError');
        const pwBtn    = document.getElementById('pwBtn');

        function validatePw() {
            const mismatch = confirmPw.value && newPw.value !== confirmPw.value;
            pwError.classList.toggle('hidden', !mismatch);
            pwBtn.disabled = mismatch;
            pwBtn.classList.toggle('opacity-40', mismatch);
        }

        newPw.addEventListener('input', validatePw);
        confirmPw.addEventListener('input', validatePw);
    </script>
</body>
</html>
