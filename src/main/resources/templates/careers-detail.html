<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="'LUMOO | ' + ${posting.title}">LUMOO | Career</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/lumoo.css">
</head>
<body class="bg-[#f9f9f9] text-gray-900 font-sans">
    <div class="bg-[#1a2336] text-white text-[9px] uppercase tracking-[0.2em] font-bold px-12 py-2 flex justify-between items-center">
        <span>📞 <span th:text="${siteSettings?.businessPhone ?: '+220 XXX XXXX'}"></span> &nbsp;|&nbsp; ✉ <span th:text="${siteSettings?.businessEmail ?: 'info@lumoo.gm'}"></span></span>
        <span>Mon–Fri 8am–6pm | Sat 9am–3pm</span>
    </div>
    <nav class="flex justify-between items-center px-12 py-6 bg-white shadow-sm sticky top-0 z-50">
        <a href="/"><img th:src="@{/images/logo.jpg}" alt="LUMOO" class="h-10 w-auto object-contain"></a>
        <a href="/careers" class="text-[10px] uppercase tracking-[0.2em] font-bold hover:text-[#4d78c0] transition">← All Positions</a>
    </nav>
    <main class="max-w-3xl mx-auto px-6 md:px-12 py-20">
        <div th:if="${param.containsKey('applied')}"
             id="applied-toast"
             class="fixed top-6 right-6 z-50 max-w-sm bg-white border-l-4 border-green-500 shadow-lg rounded-r-lg px-5 py-4 flex items-center gap-3 transition-all duration-500">
            <span class="text-green-500 text-lg">✓</span>
            <p class="text-xs font-bold text-slate-700 uppercase tracking-widest">Application received! We'll be in touch soon.</p>
        </div>
        <script th:if="${param.containsKey('applied')}">
            history.replaceState(null, '', window.location.pathname);
            setTimeout(function() {
                var t = document.getElementById('applied-toast');
                if (t) { t.style.opacity='0'; t.style.transform='translateY(-8px)'; setTimeout(function(){ t.remove(); },500); }
            }, 5000);
        </script>
        <div class="mb-12">
            <a href="/careers" class="text-[9px] text-gray-400 uppercase tracking-[0.3em] font-black hover:text-[#4d78c0] transition">← Back to Careers</a>
            <h1 class="text-4xl font-light tracking-tighter mt-4 mb-3" th:text="${posting.title}">Title</h1>
            <div class="flex flex-wrap items-center gap-4">
                <span class="text-[9px] text-gray-500 uppercase tracking-widest font-bold" th:text="${posting.department}">Dept</span>
                <span class="text-gray-300">•</span>
                <span class="text-[9px] text-gray-500 uppercase tracking-widest font-bold" th:text="${posting.location}">Location</span>
                <span class="text-gray-300">•</span>
                <span class="text-[9px] text-[#4d78c0] uppercase tracking-widest font-black border border-[#4d78c0] px-2 py-0.5" th:text="${posting.type.label()}">Type</span>
            </div>
        </div>
        <div th:if="${posting.description}" class="mb-10">
            <h2 class="text-[9px] text-gray-400 uppercase tracking-[0.3em] font-black mb-4">About the Role</h2>
            <div class="text-sm text-gray-600 leading-relaxed whitespace-pre-wrap" th:text="${posting.description}"></div>
        </div>
        <div th:if="${posting.requirements}" class="mb-16">
            <h2 class="text-[9px] text-gray-400 uppercase tracking-[0.3em] font-black mb-4">Requirements</h2>
            <div class="text-sm text-gray-600 leading-relaxed whitespace-pre-wrap" th:text="${posting.requirements}"></div>
        </div>
        <div class="border-t border-gray-100 pt-16">
            <h2 class="text-3xl font-light tracking-tighter mb-2">
                Apply <span class="font-black italic text-[#4d78c0]">Now.</span>
            </h2>
            <p class="text-[9px] text-gray-400 uppercase tracking-[0.3em] font-black mb-10">Fill in your details below</p>
            <form th:action="@{/careers/{id}/apply(id=${posting.id})}" method="post" class="space-y-6"
                  onsubmit="this.querySelector('button[type=submit]').disabled=true;this.querySelector('button[type=submit]').textContent='Sending…';">
                <input th:if="${_csrf != null}" type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                    <div>
                        <label class="text-[9px] font-black uppercase tracking-[0.3em] text-gray-400 block mb-2">Full Name *</label>
                        <input type="text" name="applicantName" required
                               class="w-full bg-transparent border-b border-gray-200 py-3 text-sm focus:border-[#1a2336] outline-none"
                               placeholder="Your full name">
                    </div>
                    <div>
                        <label class="text-[9px] font-black uppercase tracking-[0.3em] text-gray-400 block mb-2">Email *</label>
                        <input type="email" name="email" required
                               class="w-full bg-transparent border-b border-gray-200 py-3 text-sm focus:border-[#1a2336] outline-none"
                               placeholder="you@email.com">
                    </div>
                </div>
                <div>
                    <label class="text-[9px] font-black uppercase tracking-[0.3em] text-gray-400 block mb-2">Phone</label>
                    <input type="tel" name="phone"
                           class="w-full bg-transparent border-b border-gray-200 py-3 text-sm focus:border-[#1a2336] outline-none"
                           placeholder="+220 XXX XXXX">
                </div>
                <div>
                    <label class="text-[9px] font-black uppercase tracking-[0.3em] text-gray-400 block mb-2">Cover Letter *</label>
                    <textarea name="coverLetter" required rows="6"
                              class="w-full bg-transparent border-b border-gray-200 py-3 text-sm focus:border-[#1a2336] outline-none resize-none"
                              placeholder="Tell us why you're a great fit for this role..."></textarea>
                </div>
                <button type="submit"
                        class="bg-[#1a2336] text-white px-10 py-4 text-[10px] font-black uppercase tracking-widest hover:bg-[#4d78c0] transition duration-300">
                    Submit Application →
                </button>
            </form>
        </div>
    </main>
    <div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
