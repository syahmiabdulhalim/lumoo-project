<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>LUMOO | Order Details</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-[#f9f9f9] text-gray-900 font-['Inter']">

    <nav class="flex justify-between items-center px-12 py-6 bg-white shadow-sm border-b">
        <a href="/"><h1 class="text-xl font-black tracking-tighter">LUMOO</h1></a>
        <a href="/buyer/dashboard" class="text-[10px] font-bold uppercase tracking-widest text-gray-400 hover:text-blue-600 transition">← My Orders</a>
    </nav>

    <main class="max-w-3xl mx-auto py-16 px-6">
        <div class="bg-white p-10 shadow-2xl border-t-4 border-blue-600">

            <!-- Header -->
            <div class="flex justify-between items-start border-b pb-8 mb-8">
                <div>
                    <h2 class="text-2xl font-bold uppercase tracking-tighter">Order <span class="text-blue-600" th:text="'#' + ${order.id}"></span></h2>
                    <p class="text-[10px] text-gray-400 mt-1 uppercase tracking-widest"
                       th:text="${#temporals.format(order.orderDate, 'dd MMMM yyyy, HH:mm')}"></p>
                </div>
                <span class="px-4 py-1 text-[10px] font-black uppercase rounded-full"
                      th:text="${order.status}"
                      th:classappend="${order.status == 'DELIVERED' ? 'bg-green-100 text-green-700' :
                                       order.status == 'SHIPPED'   ? 'bg-purple-100 text-purple-700' :
                                       order.status == 'CANCELLED' ? 'bg-red-100 text-red-600' :
                                       order.status == 'PAID'      ? 'bg-emerald-100 text-emerald-700' :
                                                                      'bg-blue-50 text-blue-600'}">
                </span>
            </div>

            <!-- Progress tracker -->
            <div class="mb-8" th:unless="${order.status == 'CANCELLED'}">
                <div class="flex justify-between text-[7px] text-gray-300 uppercase font-black tracking-widest mb-2">
                    <span class="text-blue-600">Ordered</span>
                    <span th:classappend="${order.status == 'PAID' or order.status == 'SHIPPED' or order.status == 'DELIVERED' ? 'text-blue-600' : ''}">Confirmed</span>
                    <span th:classappend="${order.status == 'SHIPPED' or order.status == 'DELIVERED' ? 'text-blue-600' : ''}">Shipped</span>
                    <span th:classappend="${order.status == 'DELIVERED' ? 'text-green-600' : ''}">Delivered</span>
                </div>
                <div class="w-full bg-gray-100 h-0.5">
                    <div class="h-0.5 bg-blue-600"
                         th:style="${order.status == 'PENDING'   ? 'width:10%' :
                                    order.status == 'PAID'      ? 'width:33%' :
                                    order.status == 'SHIPPED'   ? 'width:66%' :
                                    order.status == 'DELIVERED' ? 'width:100%' : 'width:0%'}">
                    </div>
                </div>
            </div>

            <!-- Items -->
            <div class="space-y-6">
                <div th:each="item : ${order.items}" class="flex justify-between items-center border-b border-gray-50 pb-4">
                    <div class="flex items-center space-x-4">
                        <div class="w-12 h-12 bg-gray-100 flex items-center justify-center text-blue-600 font-bold text-[10px]">LUMOO</div>
                        <div>
                            <p class="text-xs font-bold uppercase" th:text="${item.productName}">Product Name</p>
                            <p class="text-[10px] text-gray-400" th:text="'Quantity: ' + ${item.quantity}"></p>
                            <p class="text-[10px] text-gray-400" th:text="'GMD ' + ${item.price} + ' each'"></p>
                        </div>
                    </div>
                    <p class="text-xs font-bold text-gray-700"
                       th:text="'GMD ' + ${item.price * item.quantity}"></p>
                </div>
            </div>

            <!-- Footer: address + total -->
            <div class="mt-10 pt-6 border-t-2 border-gray-100 flex justify-between items-end">
                <div>
                    <p class="text-[8px] text-gray-400 uppercase font-black">Delivery Address</p>
                    <p class="text-[10px] text-gray-600 mt-1 italic"
                       th:text="${order.address != null ? order.address : 'No address provided'}">Address</p>
                </div>
                <div class="text-right">
                    <p class="text-[10px] text-gray-400 uppercase font-bold">Total Amount</p>
                    <p class="text-2xl font-black text-blue-600" th:text="'GMD ' + ${order.totalAmount}"></p>
                </div>
            </div>

            <!-- Cancel button (only if pending) -->
            <div th:if="${order.status == 'PENDING'}" class="mt-8 pt-6 border-t border-dashed border-gray-100">
                <form th:action="@{/buyer/order/delete/{id}(id=${order.id})}" method="post"
                      onsubmit="return confirm('Are you sure you want to cancel this order?')">
                    <button type="submit"
                            class="text-[9px] font-black uppercase tracking-widest text-red-400 hover:text-red-600 transition border-b border-red-300 pb-0.5">
                        Cancel Order
                    </button>
                </form>
            </div>

        </div>
    </main>

    <div th:replace="~{fragments/loading :: loading}"></div>
</body>
</html>
