<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>LUMOO | Order Details</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-[#f9f9f9] text-gray-900 font-['Inter']">

    <nav class="flex justify-between items-center px-12 py-6 bg-white shadow-sm border-b">
        <a href="/"><img th:src="@{/images/logo.jpg}" class="h-10 w-auto"></a>
        <a href="/buyer/dashboard" class="text-[10px] font-bold uppercase tracking-widest text-gray-400 hover:text-blue-600 transition">Dashboard</a>
    </nav>

    <main class="max-w-3xl mx-auto py-16 px-6">
        <div class="bg-white p-10 shadow-2xl border-t-4 border-blue-600">
            <div class="flex justify-between items-start border-b pb-8 mb-8">
                <div>
                    <h2 class="text-2xl font-bold uppercase tracking-tighter">Order <span class="text-blue-600" th:text="'#' + ${order.id}"></span></h2>
                    <p class="text-[10px] text-gray-400 mt-1 uppercase tracking-widest" th:text="${#temporals.format(order.orderDate, 'dd MMMM yyyy, HH:mm')}"></p>
                </div>
                <span class="px-4 py-1 bg-blue-50 text-blue-600 text-[10px] font-black uppercase rounded-full" th:text="${order.status}"></span>
            </div>

            <div class="space-y-6">
                <div th:each="item : ${order.items}" class="flex justify-between items-center border-b border-gray-50 pb-4">
                    <div class="flex items-center space-x-4">
                        <div class="w-12 h-12 bg-gray-100 flex items-center justify-center text-blue-600 font-bold text-[10px]">LUMOO</div>
                        <div>
                            <p class="text-xs font-bold uppercase" th:text="${item.productName}">Nama Produk</p>
                            <p class="text-[10px] text-gray-400" th:text="'Kuantiti: ' + ${item.quantity}"></p>
                        </div>
                    </div>
                    <p class="text-xs font-bold text-gray-700" th:text="'GMD ' + (${item.price} * ${item.quantity})"></p>
                </div>
            </div>

            <div class="mt-10 pt-6 border-t-2 border-gray-100 flex justify-between items-end">
                <div>
                    <p class="text-[8px] text-gray-400 uppercase font-black">Delivery Address</p>
                    <p class="text-[10px] text-gray-600 mt-1 italic">Building the Nation, Banjul, Gambia</p>
                </div>
                <div class="text-right">
                    <p class="text-[10px] text-gray-400 uppercase font-bold">Total Amount</p>
                    <p class="text-2xl font-black text-blue-600" th:text="'GMD ' + ${order.totalAmount}"></p>
                </div>
            </div>
        </div>
    </main>
    <div th:replace="~{fragments/loading :: loading}"></div>
</body>
</html>
