<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>LUMOO | Buyer Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#f9f9f9] text-gray-900 font-sans">

    <nav class="flex justify-between items-center px-12 py-6 bg-white shadow-sm sticky top-0 z-50">
        <h1 class="text-2xl font-black tracking-tighter">LUMOO</h1>
        <div class="space-x-8 text-[10px] uppercase tracking-[0.2em] font-bold">
            <a href="/" class="hover:text-blue-600 transition">Home</a>
            <a href="/logout" class="text-gray-400 hover:text-black transition">Logout</a>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-12 py-16">
        <h2 class="text-3xl font-light mb-12 uppercase tracking-widest">My <span class="font-bold">Dashboard</span></h2>

        <section class="mt-10 bg-white p-8 shadow-sm">
    <h3 class="text-sm font-bold uppercase tracking-widest mb-6 border-b pb-4">My Purchase History</h3>
    
    <div th:each="order : ${orders}" class="flex items-center justify-between border-b border-gray-50 py-6 last:border-0">
        <div class="flex items-center space-x-6">
            <div class="bg-gray-100 w-16 h-16 flex items-center justify-center">
                <span class="text-[10px] font-bold text-blue-600">ORDER</span>
            </div>
            <div>
                <p class="text-xs font-bold uppercase" th:text="'Order #' + ${order.id}">#001</p>
                <p class="text-[10px] text-gray-400" th:text="${#temporals.format(order.orderDate, 'dd MMM yyyy')}">Date</p>
                <p class="text-[10px] mt-1">Status: <span class="text-blue-600 font-bold" th:text="${order.status}">PENDING</span></p>
            </div>
        </div>
        
        <div class="text-right space-y-2">
            <p class="text-sm font-bold text-gray-900">GMD <span th:text="${order.totalAmount}">0.00</span></p>
            
            <form th:action="@{/buyer/order/delete/{id}(id=${order.id})}" method="post" onsubmit="return confirm('Cancel this order?')">
                <button type="submit" class="text-[9px] font-bold text-red-500 uppercase hover:underline">Cancel Order</button>
            </form>
        </div>
    </div>
</section>

        <section class="bg-white p-10 shadow-sm border-l-8 border-blue-600">
            <h3 class="font-black uppercase tracking-widest mb-8 border-b pb-4 text-xs">Alerts & Notifications</h3>
            <div class="space-y-4">
                <div th:each="n : ${notifications}" th:if="${n != null}" 
                     class="p-4 border-b border-gray-50 last:border-0 flex justify-between items-center">
                    <p th:text="${n?.message}" class="text-[10px] text-gray-600"></p>
                    <span th:text="${n?.createdAt != null ? #temporals.format(n.createdAt, 'HH:mm') : ''}" class="text-[8px] text-gray-300"></span>
                </div>
                <div th:if="${notifications == null || notifications.empty}" class="text-center py-10 text-gray-300 text-[9px] uppercase tracking-widest">
                    No new notifications.
                </div>
            </div>
        </section>

    </main>

</body>
</html>
