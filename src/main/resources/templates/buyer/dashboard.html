<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>LUMOO | Buyer Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#f9f9f9] text-gray-900 font-sans">

    <nav class="flex justify-between items-center px-12 py-6 bg-white shadow-sm sticky top-0 z-50">
        <h1 class="text-2xl font-black tracking-tighter">LUMOO</h1>
        <div class="space-x-8 text-[10px] uppercase tracking-[0.2em] font-bold">
            <a href="/" class="hover:text-blue-600 transition">Home</a>
            <a href="/logout" class="text-gray-400 hover:text-black transition">Logout</a>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 md:px-12 py-12 md:py-20">
    <header class="mb-12">
        <h2 class="text-4xl font-light tracking-tighter">My <span class="font-black italic text-blue-600">Orders</span></h2>
        <p class="text-[9px] text-gray-400 uppercase tracking-[0.3em] mt-2">Track your material deliveries</p>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div th:each="o : ${orders}" class="bg-white p-6 border border-gray-100 shadow-sm hover:shadow-xl transition duration-500 relative">
            <div class="flex justify-between items-start mb-6">
                <div>
                    <p class="text-[8px] text-gray-400 uppercase font-black tracking-widest" th:text="${'#LMO-' + o.id}"></p>
                    <h3 class="text-xs font-bold uppercase mt-1" th:text="${#temporals.format(o.createdAt, 'dd MMM yyyy')}"></h3>
                </div>
                <span th:text="${o.status}" 
                      class="px-3 py-1 text-[7px] font-black uppercase tracking-tighter rounded-full"
                      th:classappend="${o.status == 'DELIVERED' ? 'bg-green-100 text-green-700' : 'bg-blue-100 text-blue-700'}">
                </span>
            </div>
            
            <div class="border-t border-dashed border-gray-100 pt-4 flex justify-between items-end">
                <div>
                    <p class="text-[8px] text-gray-400 uppercase mb-1">Total Amount</p>
                    <p class="text-sm font-black" th:text="${'GMD ' + o.totalAmount}"></p>
                </div>
                <a th:href="@{/buyer/order/{id}(id=${o.id})}" class="text-[9px] font-bold text-blue-600 uppercase border-b border-blue-600 pb-1">Details →</a>
            </div>
        </div>
    </div>
</main>
<div th:replace="~{fragments/loading :: loading}"></div>
</body>
</html>
