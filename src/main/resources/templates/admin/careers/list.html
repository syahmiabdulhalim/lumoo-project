<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>LUMOO Admin | Careers</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/lumoo.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-50 text-slate-900 font-['Nunito_Sans']">
    <nav class="bg-slate-900 text-white px-8 py-4 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-6">
            <a href="/admin/dashboard" class="text-slate-400 hover:text-white transition text-xs font-bold uppercase tracking-widest">← Dashboard</a>
            <span class="text-slate-600">|</span>
            <span class="text-sm font-bold">Career Postings</span>
        </div>
        <div class="flex items-center gap-3">
            <a href="/admin/careers/new"
               class="bg-[#4d78c0] hover:bg-[#3d68b0] text-white px-5 py-2 text-xs font-bold uppercase tracking-widest transition rounded-lg">
                + New Posting
            </a>
            <div th:replace="~{fragments/bell :: bell}"></div>
        </div>
    </nav>
    <main class="max-w-6xl mx-auto px-6 py-12">
        <div th:if="${flashMsg != null}" id="flash-toast"
             class="fixed top-6 right-6 z-50 flex items-center gap-3 px-5 py-3 rounded-lg shadow-lg text-white text-xs font-bold uppercase tracking-widest"
             th:classappend="${flashType == 'green'} ? 'bg-green-600' : (${flashType == 'red'} ? 'bg-red-500' : 'bg-[#4d78c0]')">
            <span th:text="${flashMsg}"></span>
            <button onclick="document.getElementById('flash-toast').remove()" class="ml-2 opacity-70 hover:opacity-100">✕</button>
        </div>
        <script th:if="${flashMsg != null}">
            setTimeout(() => { const t = document.getElementById('flash-toast'); if (t) { t.style.opacity='0'; setTimeout(()=>t.remove(),500); }}, 3000);
        </script>
        <div class="mb-6 flex items-center gap-4">
            <div class="bg-white border border-slate-200 rounded-lg px-5 py-3 flex items-center gap-3">
                <span class="text-xs text-slate-500 uppercase tracking-wider font-semibold">Total Postings</span>
                <span class="text-lg font-bold text-slate-800" th:text="${#lists.size(postings)}">0</span>
            </div>
            <div class="bg-white border border-slate-200 rounded-lg px-5 py-3 flex items-center gap-3">
                <span class="text-xs text-slate-500 uppercase tracking-wider font-semibold">New Applications</span>
                <span class="text-lg font-bold text-[#4d78c0]" th:text="${newApplicationCount}">0</span>
            </div>
        </div>
        <div class="bg-white rounded-xl border border-slate-200 overflow-hidden">
            <div class="px-6 py-4 border-b border-slate-100">
                <h1 class="text-sm font-bold text-slate-800 uppercase tracking-wider">All Job Postings</h1>
            </div>
            <table class="w-full text-sm" th:if="${postings != null and !#lists.isEmpty(postings)}">
                <thead>
                    <tr class="bg-slate-50 border-b border-slate-100 text-xs font-bold text-slate-500 uppercase tracking-wider">
                        <th class="text-left px-6 py-3">Title</th>
                        <th class="text-left px-6 py-3">Department</th>
                        <th class="text-left px-6 py-3">Type</th>
                        <th class="text-left px-6 py-3">Status</th>
                        <th class="text-left px-6 py-3">Applications</th>
                        <th class="text-left px-6 py-3">Actions</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-100">
                    <tr th:each="p : ${postings}" class="hover:bg-slate-50 transition">
                        <td class="px-6 py-4">
                            <p class="font-semibold text-slate-800" th:text="${p.title}">Title</p>
                            <p class="text-xs text-slate-400 mt-0.5" th:text="${p.location}">Location</p>
                        </td>
                        <td class="px-6 py-4">
                            <span class="text-xs bg-blue-50 text-blue-700 px-2 py-1 rounded font-semibold" th:text="${p.department}">Dept</span>
                        </td>
                        <td class="px-6 py-4 text-xs text-slate-500" th:text="${p.type.label()}">Type</td>
                        <td class="px-6 py-4">
                            <span th:if="${p.active}" class="text-xs bg-emerald-100 text-emerald-700 px-2 py-1 rounded font-bold uppercase tracking-wider">Active</span>
                            <span th:unless="${p.active}" class="text-xs bg-slate-100 text-slate-500 px-2 py-1 rounded font-bold uppercase tracking-wider">Closed</span>
                        </td>
                        <td class="px-6 py-4">
                            <a th:href="@{/admin/careers/{id}/applications(id=${p.id})}"
                               class="text-xs font-bold text-[#4d78c0] hover:underline"
                               th:text="${'View (' + appCount_ + ')'}">View</a>
                        </td>
                        <td class="px-6 py-4">
                            <div class="flex items-center gap-2">
                                <a th:href="@{/admin/careers/edit/{id}(id=${p.id})}"
                                   class="text-xs bg-blue-50 hover:bg-blue-100 text-blue-700 px-3 py-1.5 rounded font-semibold transition">Edit</a>
                                <form th:id="'del-' + ${p.id}"
                                      th:action="@{/admin/careers/delete/{id}(id=${p.id})}" method="post" class="hidden"></form>
                                <button type="button" class="btn-lm-delete text-xs bg-red-50 hover:bg-red-100 text-red-600 px-3 py-1.5 rounded font-semibold transition"
                                        data-title="Delete Posting"
                                        th:data-msg="|Delete '${p.title}'? All applications will also be removed.|"
                                        th:data-form-id="'del-' + ${p.id}">Delete</button>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
            <div th:if="${postings == null or #lists.isEmpty(postings)}" class="py-20 text-center">
                <p class="text-sm text-slate-400 mb-4">No job postings yet.</p>
                <a href="/admin/careers/new" class="text-sm font-bold text-[#4d78c0] hover:underline">Create your first posting →</a>
            </div>
        </div>
    </main>
</body>
</html>
