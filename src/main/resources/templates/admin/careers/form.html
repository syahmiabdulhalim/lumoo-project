<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${editing} ? 'Edit Posting' : 'New Posting'">Job Posting</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/lumoo.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-50 text-slate-900 font-['Nunito_Sans']">
    <nav class="bg-slate-900 text-white px-8 py-4 flex items-center gap-6 sticky top-0 z-50">
        <a href="/admin/careers" class="text-slate-400 hover:text-white transition text-xs font-bold uppercase tracking-widest">← Careers</a>
        <span class="text-slate-600">|</span>
        <span class="text-sm font-bold" th:text="${editing} ? 'Edit Job Posting' : 'New Job Posting'">Job Posting</span>
    </nav>
    <main class="max-w-3xl mx-auto px-6 py-12">
        <div class="bg-white rounded-xl border border-slate-200 p-8">
            <form th:action="${editing} ? @{/admin/careers/edit/{id}(id=${posting.id})} : @{/admin/careers/new}"
                  method="post" class="space-y-6">
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                    <div class="sm:col-span-2">
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2">Job Title *</label>
                        <input type="text" name="title" required th:value="${posting.title}"
                               class="w-full border border-slate-200 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-[#4d78c0]"
                               placeholder="e.g. Sales Executive">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2">Department</label>
                        <input type="text" name="department" th:value="${posting.department}"
                               class="w-full border border-slate-200 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-[#4d78c0]"
                               placeholder="e.g. Sales, Operations">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2">Location</label>
                        <input type="text" name="location" th:value="${posting.location}"
                               class="w-full border border-slate-200 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-[#4d78c0]"
                               placeholder="e.g. Banjul, Gambia">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2">Job Type</label>
                        <select name="type" class="w-full border border-slate-200 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-[#4d78c0]">
                            <option th:each="t : ${jobTypes}" th:value="${t}" th:text="${t.label()}"
                                    th:selected="${posting.type == t}">Type</option>
                        </select>
                    </div>
                    <div class="flex items-center gap-3 pt-6">
                        <input type="checkbox" name="active" id="active" value="true"
                               th:checked="${posting.active or !editing}"
                               class="w-4 h-4 accent-[#4d78c0]">
                        <label for="active" class="text-sm font-semibold text-slate-700">Active (visible on public page)</label>
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2">Job Description *</label>
                    <textarea name="description" required rows="6" th:text="${posting.description}"
                              class="w-full border border-slate-200 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-[#4d78c0] resize-none"
                              placeholder="Describe the role, responsibilities..."></textarea>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2">Requirements</label>
                    <textarea name="requirements" rows="5" th:text="${posting.requirements}"
                              class="w-full border border-slate-200 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-[#4d78c0] resize-none"
                              placeholder="List qualifications, skills required..."></textarea>
                </div>
                <div class="flex items-center gap-3 pt-2">
                    <button type="submit"
                            class="bg-[#1a2336] hover:bg-[#4d78c0] text-white px-8 py-3 text-xs font-bold uppercase tracking-widest rounded-lg transition">
                        <span th:text="${editing} ? 'Save Changes' : 'Create Posting'">Save</span>
                    </button>
                    <a href="/admin/careers" class="text-xs text-slate-500 hover:text-slate-700 font-semibold">Cancel</a>
                </div>
            </form>
        </div>
    </main>
</body>
</html>
