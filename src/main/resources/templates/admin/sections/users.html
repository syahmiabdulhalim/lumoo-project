<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="content">

    <!-- USERS TABLE -->
    <section id="users">
        <div class="bg-white rounded-xl border border-slate-200 overflow-hidden">
            <div class="px-6 py-4 border-b border-slate-100 flex items-center justify-between">
                <div>
                    <h2 class="text-sm font-semibold text-slate-800">Users</h2>
                    <p class="text-xs text-slate-400 mt-0.5">All registered accounts</p>
                </div>
                <span class="bg-slate-100 text-slate-600 text-xs font-mono px-2 py-1 rounded-md" th:text="${#lists.size(users)} + ' accounts'">0 accounts</span>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-sm">
                    <thead>
                        <tr class="bg-slate-50 border-b border-slate-100">
                            <th class="text-left px-6 py-3 text-xs font-semibold text-slate-500 uppercase tracking-wider">User</th>
                            <th class="text-left px-6 py-3 text-xs font-semibold text-slate-500 uppercase tracking-wider">Role</th>
                            <th class="text-left px-6 py-3 text-xs font-semibold text-slate-500 uppercase tracking-wider">Verified</th>
                            <th class="text-left px-6 py-3 text-xs font-semibold text-slate-500 uppercase tracking-wider">Actions</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-100">
                        <tr th:each="u : ${users}" class="hover:bg-slate-50 transition-colors">
                            <td class="px-6 py-4">
                                <div class="flex items-center gap-3">
                                    <div class="w-7 h-7 rounded-full bg-slate-100 flex items-center justify-center text-slate-500 text-xs font-bold"
                                         th:text="${#strings.toUpperCase(#strings.substring(u.email, 0, 1))}">A</div>
                                    <div>
                                        <p class="text-sm text-slate-700 font-medium" th:text="${u.email}">user@email.com</p>
                                        <p class="text-[10px] text-slate-400" th:text="${u.fullName ?: u.username}"></p>
                                    </div>
                                </div>
                            </td>
                            <td class="px-6 py-4">
                                <span class="text-xs font-semibold px-2.5 py-1 rounded-full"
                                      th:text="${u.role}"
                                      th:classappend="${u.role.name() == 'ADMIN'  ? 'badge-admin' :
                                                       u.role.name() == 'VENDOR' ? 'badge-vendor' : 'badge-user'}">
                                </span>
                            </td>
                            <td class="px-6 py-4">
                                <span th:if="${u.verified}" class="inline-flex items-center gap-1 text-xs text-emerald-600 font-semibold">
                                    <svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/></svg>
                                    Verified
                                </span>
                                <span th:unless="${u.verified}" class="text-xs text-slate-400">Not verified</span>
                            </td>
                            <td class="px-6 py-4">
                                <div class="flex items-center gap-2">
                                    <form th:if="${!u.verified and u.role.name() != 'ADMIN'}"
                                          th:action="@{/admin/verify-user/{id}(id=${u.id})}" method="post">
                                        <button type="submit" class="text-[10px] font-bold uppercase tracking-wide px-3 py-1.5 rounded bg-emerald-50 text-emerald-700 hover:bg-emerald-100 transition whitespace-nowrap">
                                            Verify
                                        </button>
                                    </form>
                                    <form th:if="${u.role.name() == 'USER'}"
                                          th:id="'upgrade-form-' + ${u.id}"
                                          th:action="@{/admin/upgrade-vendor/{id}(id=${u.id})}" method="post"
                                          class="hidden"></form>
                                    <button th:if="${u.role.name() == 'USER'}"
                                            type="button" class="btn-lm-delete text-[10px] font-bold uppercase tracking-wide px-3 py-1.5 rounded bg-violet-50 text-violet-700 hover:bg-violet-100 transition whitespace-nowrap"
                                            data-title="Upgrade to Vendor"
                                            th:data-msg="|Upgrade ${u.email} to Vendor? They will gain full vendor access after re-login.|"
                                            data-btn="Upgrade to Vendor"
                                            th:data-form-id="'upgrade-form-' + ${u.id}">
                                        → Vendor
                                    </button>
                                    <button type="button" class="btn-lm-delete text-slate-300 hover:text-red-500 transition-colors ml-1"
                                       data-title="Delete User Account"
                                       th:data-msg="|Delete account for ${u.email}? All their orders and data will be removed.|"
                                       data-require-type="true"
                                       th:data-url="@{/admin/delete-user/{id}(id=${u.id})}">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                                    </button>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
                <div th:if="${usersTotalPages > 1}"
                     class="px-6 py-4 border-t border-slate-100 flex items-center justify-between">
                    <a th:if="${usersCurrentPage > 0}"
                       th:href="@{/admin/sections/users(page=${usersCurrentPage - 1})}"
                       class="text-xs bg-slate-100 hover:bg-slate-200 text-slate-700 px-3 py-1.5 rounded-lg font-medium transition-colors">← Previous</a>
                    <span class="text-xs text-slate-400 mx-auto"
                          th:text="'Page ' + (${usersCurrentPage} + 1) + ' of ' + ${usersTotalPages}"></span>
                    <a th:if="${usersCurrentPage + 1 < usersTotalPages}"
                       th:href="@{/admin/sections/users(page=${usersCurrentPage + 1})}"
                       class="text-xs bg-slate-100 hover:bg-slate-200 text-slate-700 px-3 py-1.5 rounded-lg font-medium transition-colors">Next →</a>
                </div>
            </div>
        </div>
    </section>

    <!-- INQUIRIES -->
    <section id="inquiries">
        <div class="bg-white rounded-xl border border-slate-200 overflow-hidden">
            <div class="px-6 py-4 border-b border-slate-100 flex items-center justify-between">
                <div>
                    <h2 class="text-sm font-semibold text-slate-800">Inquiries</h2>
                    <p class="text-xs text-slate-400 mt-0.5">Customer messages and support requests</p>
                </div>
                <span class="bg-slate-100 text-slate-600 text-xs font-mono px-2 py-1 rounded-md" th:text="${#lists.size(inquiries)} + ' messages'">0 messages</span>
            </div>
            <div class="divide-y divide-slate-100">
                <div th:each="inq : ${inquiries}" class="table-row px-6 py-5">
                    <div class="flex items-start justify-between gap-4">
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center gap-3 mb-1">
                                <p class="text-sm font-semibold text-slate-800" th:text="${inq.subject}">Subject</p>
                                <span class="mono text-[10px] text-slate-400"
                                      th:text="${#temporals.format(inq.createdAt, 'dd MMM, HH:mm')}">Date</span>
                            </div>
                            <p class="text-xs text-slate-500 mb-3" th:text="${inq.buyerName + ' · ' + inq.email}">From</p>
                            <p class="text-sm text-slate-600 bg-slate-50 rounded-lg px-4 py-3 leading-relaxed"
                               th:text="${inq.message}">Message</p>
                        </div>
                        <div class="flex flex-col gap-2 shrink-0">
                            <a th:href="${'mailto:' + inq.email + '?subject=Re: ' + inq.subject}"
                               class="text-xs bg-slate-800 hover:bg-[#4d78c0] text-white px-4 py-2 rounded-lg font-medium transition-colors text-center">
                                Reply
                            </a>
                            <button type="button" class="btn-lm-delete text-xs text-slate-400 hover:text-red-500 transition-colors text-center font-medium"
                               data-title="Archive Inquiry"
                               th:data-msg="|Archive the inquiry from '${inq.email}'? It will be permanently deleted.|"
                               data-btn="Archive"
                               th:data-url="@{/admin/delete-inquiry/{id}(id=${inq.id})}">
                                Archive
                            </button>
                        </div>
                    </div>
                </div>
                <div th:if="${inquiries == null || inquiries.empty}" class="text-center py-16">
                    <svg class="w-10 h-10 text-slate-200 mx-auto mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/></svg>
                    <p class="text-sm text-slate-400">No pending inquiries</p>
                </div>
            </div>
        </div>
    </section>

</div>
</body>
</html>
