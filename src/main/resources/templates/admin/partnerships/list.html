<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>LUMOO Admin | Partnerships</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/lumoo.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-50 text-slate-900 font-['Nunito_Sans']">
    <nav class="bg-slate-900 text-white px-8 py-4 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-6">
            <a href="/admin/dashboard" class="text-slate-400 hover:text-white transition text-xs font-bold uppercase tracking-widest">← Dashboard</a>
            <span class="text-slate-600">|</span>
            <span class="text-sm font-bold">Partnership Applications</span>
        </div>
        <div th:replace="~{fragments/bell :: bell}"></div>
    </nav>
    <main class="max-w-6xl mx-auto px-6 py-12">
        <div th:if="${flashMsg != null}" id="flash-toast"
             class="fixed top-6 right-6 z-50 flex items-center gap-3 px-5 py-3 rounded-lg shadow-lg text-white text-xs font-bold uppercase tracking-widest"
             th:classappend="${flashType == 'green'} ? 'bg-green-600' : (${flashType == 'red'} ? 'bg-red-500' : 'bg-[#4d78c0]')">
            <span th:text="${flashMsg}"></span>
            <button onclick="document.getElementById('flash-toast').remove()" class="ml-2 opacity-70 hover:opacity-100">✕</button>
        </div>
        <script th:if="${flashMsg != null}">
            setTimeout(() => { const t = document.getElementById('flash-toast'); if (t) { t.style.opacity='0'; setTimeout(()=>t.remove(),500); }}, 3000);
        </script>
        <div class="bg-white rounded-xl border border-slate-200 overflow-hidden">
            <div class="px-6 py-4 border-b border-slate-100 flex items-center justify-between">
                <h1 class="text-sm font-bold text-slate-800 uppercase tracking-wider">Partnership Applications</h1>
                <span class="text-xs text-slate-400" th:text="${#lists.size(applications)} + ' total'">0 total</span>
            </div>
            <table class="w-full text-sm" th:if="${applications != null and !#lists.isEmpty(applications)}">
                <thead>
                    <tr class="bg-slate-50 border-b border-slate-100 text-xs font-bold text-slate-500 uppercase tracking-wider">
                        <th class="text-left px-6 py-3">Company</th>
                        <th class="text-left px-6 py-3">Contact</th>
                        <th class="text-left px-6 py-3">Type</th>
                        <th class="text-left px-6 py-3">Submitted</th>
                        <th class="text-left px-6 py-3">Status</th>
                        <th class="text-left px-6 py-3">Actions</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-100">
                    <tr th:each="app : ${applications}" class="hover:bg-slate-50 transition">
                        <td class="px-6 py-4">
                            <p class="font-semibold text-slate-800" th:text="${app.companyName}">Company</p>
                        </td>
                        <td class="px-6 py-4">
                            <p class="text-xs text-slate-600" th:text="${app.contactName}">Name</p>
                            <p class="text-xs text-slate-400" th:text="${app.email}">email</p>
                        </td>
                        <td class="px-6 py-4">
                            <span class="text-xs bg-purple-50 text-purple-700 px-2 py-1 rounded font-semibold"
                                  th:text="${app.partnerType.label()}">Type</span>
                        </td>
                        <td class="px-6 py-4 text-xs text-slate-400"
                            th:text="${#temporals.format(app.submittedAt, 'dd MMM yyyy')}">Date</td>
                        <td class="px-6 py-4">
                            <span class="text-xs px-2 py-1 rounded font-bold uppercase tracking-wider"
                                  th:classappend="${app.status.name() == 'NEW'}      ? 'bg-blue-100 text-blue-700'    :
                                                  (${app.status.name() == 'REVIEWED'} ? 'bg-yellow-100 text-yellow-700' :
                                                  (${app.status.name() == 'APPROVED'} ? 'bg-emerald-100 text-emerald-700' :
                                                                                         'bg-red-100 text-red-600'))"
                                  th:text="${app.status}">Status</span>
                        </td>
                        <td class="px-6 py-4">
                            <a th:href="@{/admin/partnerships/{id}(id=${app.id})}"
                               class="text-xs bg-blue-50 hover:bg-blue-100 text-blue-700 px-3 py-1.5 rounded font-semibold transition">View</a>
                        </td>
                    </tr>
                </tbody>
            </table>
            <div th:if="${applications == null or #lists.isEmpty(applications)}" class="py-20 text-center">
                <p class="text-sm text-slate-400">No partnership applications yet.</p>
            </div>
        </div>
    </main>
</body>
</html>
