<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>LUMOO | Forgot Password</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/lumoo.css">
</head>
<body class="bg-[#f9f9f9] flex items-center justify-center min-h-screen font-['Nunito_Sans']">
    <div class="w-full max-w-md bg-white p-12 shadow-sm border border-gray-100">
        <h2 class="text-3xl font-light tracking-tighter mb-8 uppercase">Reset <span class="font-black italic">Access.</span></h2>
        
        <p th:if="${message}" th:text="${message}" class="text-green-600 text-[10px] mb-6 font-bold"></p>
        <p th:if="${error}" th:text="${error}" class="text-red-600 text-[10px] mb-6 font-bold"></p>

        <form th:action="@{/forgot-password}" method="post" class="space-y-6">
<input th:if="${_csrf != null}" type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <div>
                <label class="text-[9px] uppercase tracking-widest font-black text-gray-400">Email Address</label>
                <input type="email" name="email" required class="w-full border-b-2 border-gray-100 py-3 focus:border-[#1a2336] outline-none transition text-sm">
            </div>
            <button type="submit" class="w-full bg-[#1a2336] text-white py-4 text-[10px] font-bold uppercase tracking-[0.3em] hover:bg-gray-800 transition">Send Reset Link</button>
        </form>
        <div class="mt-8 text-center">
            <a href="/login" class="text-[9px] uppercase tracking-widest text-gray-400 hover:text-black">Back to Login</a>
        </div>
    </div>
</body>
<div th:replace="~{fragments/loading :: loading}"></div>
</html>
