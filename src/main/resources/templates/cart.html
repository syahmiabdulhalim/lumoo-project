<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>LUMOO | Your Cart</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body class="bg-[#f9f9f9] font-['Inter']">

    <nav class="flex justify-between items-center px-6 md:px-12 py-6 bg-white shadow-sm sticky top-0 z-50">
        <a href="/">
            <img th:src="@{/images/logo.jpg}" alt="LUMOO Logo" class="h-10 w-auto object-contain">
        </a>
        <div class="flex items-center gap-6 text-[10px] uppercase font-bold tracking-widest">
            <a href="/" class="text-gray-400 hover:text-black">Market</a>
            <a href="/buyer/dashboard" class="text-gray-400 hover:text-black">Orders</a>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 md:px-12 py-12 md:py-20">
        <h2 class="text-4xl font-light tracking-tighter mb-12">Your <span class="font-black italic text-blue-600">Basket.</span></h2>

        <div th:if="${cart == null || #lists.isEmpty(cart)}" class="py-24 text-center bg-white border border-dashed border-gray-200">
            <p class="text-[10px] uppercase tracking-[0.4em] text-gray-300 font-bold mb-6">Your collection is empty.</p>
            <a href="/" class="bg-black text-white px-10 py-4 text-[10px] font-bold uppercase tracking-widest hover:bg-blue-600 transition">
                Start Shopping
            </a>
        </div>

        <div th:if="${cart != null && !#lists.isEmpty(cart)}" class="flex flex-col lg:flex-row gap-12">
            
            <div class="lg:w-3/4 space-y-4">
                <div th:each="item : ${cart}" 
                     class="flex flex-col sm:flex-row items-center gap-6 bg-white p-6 shadow-sm border border-gray-50 group transition duration-500">
                    
                    <img th:src="${item.product.imageUrl}" class="w-20 h-20 object-cover grayscale group-hover:grayscale-0 transition">
                    
                    <div class="flex-1 text-center sm:text-left">
                        <h4 class="text-[10px] font-black uppercase tracking-widest" th:text="${item.product.name}"></h4>
                        <p class="text-[9px] text-gray-400 mt-1 uppercase" th:text="${item.product.category}"></p>
                    </div>

                    <div class="flex items-center gap-8 border-t sm:border-t-0 pt-4 sm:pt-0 w-full sm:w-auto justify-between">
                        <div class="text-center sm:text-right">
                            <p class="text-[8px] text-gray-400 uppercase font-bold">Price</p>
                            <p class="text-xs font-bold" th:text="${'GMD ' + item.price}"></p>
                        </div>
                        <div class="text-center sm:text-right">
                            <p class="text-[8px] text-gray-400 uppercase font-bold">Qty</p>
                            <p class="text-xs font-bold" th:text="${item.quantity}"></p>
                        </div>
                        <a th:href="@{/cart/remove/{id}(id=${item.id})}" 
                           class="text-red-500 text-[10px] font-black uppercase border-b border-red-100 hover:border-red-500 transition">Remove</a>
                    </div>
                </div>
            </div>

            <div class="lg:w-1/4">
                <div class="bg-black text-white p-8 sticky top-32">
                    <h3 class="text-[10px] font-black uppercase tracking-[0.3em] mb-8 border-b border-gray-800 pb-4 text-blue-600">Summary</h3>
                    
                    <div class="flex justify-between items-end mb-10">
                        <p class="text-[9px] text-gray-500 uppercase font-bold">Total Amount</p>
                        <h2 class="text-2xl font-black tracking-tighter" th:text="${'GMD ' + totalAmount}">GMD 0</h2>
                    </div>

                    <a href="/checkout" class="block w-full bg-blue-600 py-5 text-[10px] font-black uppercase tracking-[0.2em] text-center hover:bg-white hover:text-black transition duration-700">
                        Checkout Now →
                    </a>
                </div>
            </div>
        </div>
    </main>

    <footer class="text-center py-20 border-t border-gray-100 mt-20">
        <p class="text-[9px] uppercase tracking-[0.5em] text-gray-400">© 2026 LUMOO Gambia</p>
    </footer>

</body>
<div th:replace="~{fragments/loading :: loading}"></div>
</html>
