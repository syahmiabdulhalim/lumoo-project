<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>LUMOO | Your Cart</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/lumoo.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body class="bg-[#f9f9f9] font-['Nunito_Sans']">
    <div class="bg-[#1a2336] text-white text-[9px] uppercase tracking-[0.2em] font-bold px-12 py-2 flex justify-between items-center">
        <span>📞 <span th:text="${siteSettings?.businessPhone ?: '+220 XXX XXXX'}"></span> &nbsp;|&nbsp; ✉ <span th:text="${siteSettings?.businessEmail ?: 'info@lumoo.gm'}"></span></span>
        <span>Mon–Fri 8am–6pm | Sat 9am–3pm</span>
    </div>
    <nav class="flex justify-between items-center px-6 md:px-12 py-6 bg-white shadow-sm sticky top-8 z-50">
        <a href="/">
            <img th:src="@{/images/logo.jpg}" alt="LUMOO Logo" class="h-10 w-auto object-contain">
        </a>
        <div class="flex items-center gap-6 text-[10px] uppercase font-bold tracking-widest">
            <a href="/" class="text-gray-400 hover:text-black">Market</a>
            <a href="/buyer/dashboard" class="text-gray-400 hover:text-black">Orders</a>
        </div>
    </nav>
    <main class="max-w-7xl mx-auto px-6 md:px-12 py-12 md:py-20">
        <h2 class="text-4xl font-light tracking-tighter mb-6">Your <span class="font-black italic text-[#4d78c0]">Basket.</span></h2>
        <div th:if="${param.containsKey('error') and param.error != null and param.error[0] == 'max_stock'}"
             class="mb-6 border-l-4 border-amber-400 bg-amber-50 px-4 py-3">
            <p class="text-xs font-bold text-amber-700 uppercase tracking-widest">Maximum available stock reached for that item.</p>
        </div>
        <div th:if="${cart == null || #lists.isEmpty(cart)}" class="py-24 text-center bg-white border border-dashed border-gray-200">
            <p class="text-[10px] uppercase tracking-[0.4em] text-gray-300 font-bold mb-6">Your collection is empty.</p>
            <a href="/" class="bg-[#1a2336] text-white px-10 py-4 text-[10px] font-bold uppercase tracking-widest hover:bg-[#4d78c0] transition">
                Start Shopping
            </a>
        </div>
        <div th:if="${cart != null && !#lists.isEmpty(cart)}" class="flex flex-col lg:flex-row gap-12">
            <div class="lg:w-3/4 space-y-4">
                <div th:each="item : ${cart}" 
                     class="flex flex-col sm:flex-row items-center gap-6 bg-white p-6 shadow-sm border border-gray-50 group transition duration-500">
                   <div class="w-20 h-20 bg-gray-100 flex items-center justify-center text-[#4d78c0] font-bold text-[9px] uppercase tracking-widest shrink-0">LUMOO</div>
            <h4 class="text-[10px] font-black uppercase tracking-widest" th:text="${item.name}"></h4>
            <p class="text-[9px] text-gray-400 mt-1 uppercase">Product</p>
                    <div class="flex items-center gap-8 border-t sm:border-t-0 pt-4 sm:pt-0 w-full sm:w-auto justify-between">
                        <div class="text-center sm:text-right">
                            <p class="text-[8px] text-gray-400 uppercase font-bold">Price</p>
                            <p class="text-xs font-bold" th:text="${'GMD ' + item.price}"></p>
                        </div>
                        <div class="flex flex-col items-center gap-1">
                            <p class="text-[8px] text-gray-400 uppercase font-bold">Qty</p>
                            <div class="flex items-center border border-gray-200">
                                <form th:action="@{/cart/update/{id}(id=${item.id})}" method="post">
                                    <input th:if="${_csrf != null}" type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <input type="hidden" name="delta" value="-1"/>
                                    <button type="submit"
                                            class="w-8 h-8 flex items-center justify-center text-gray-500 hover:bg-gray-100 transition text-sm font-bold">−</button>
                                </form>
                                <span class="w-8 h-8 flex items-center justify-center text-xs font-black border-x border-gray-200"
                                      th:text="${item.quantity}">1</span>
                                <form th:action="@{/cart/update/{id}(id=${item.id})}" method="post">
                                    <input th:if="${_csrf != null}" type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <input type="hidden" name="delta" value="1"/>
                                    <button type="submit"
                                            class="w-8 h-8 flex items-center justify-center text-gray-500 hover:bg-gray-100 transition text-sm font-bold">+</button>
                                </form>
                            </div>
                        </div>
                        <div class="text-center sm:text-right">
                            <p class="text-[8px] text-gray-400 uppercase font-bold">Subtotal</p>
                            <p class="text-xs font-bold" th:text="${'GMD ' + #numbers.formatDecimal(item.price * item.quantity, 1, 2)}"></p>
                        </div>
                        <button type="button" class="btn-lm-delete text-red-400 hover:text-red-600 transition"
                                data-title="Remove Item"
                                th:data-msg="|Remove '${item.product.name}' from your cart?|"
                                data-btn="Remove"
                                th:data-url="@{/cart/remove/{id}(id=${item.id})}">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                        </button>
                    </div>
                </div>
            </div>
            <div class="lg:w-1/4">
                <div class="bg-[#1a2336] text-white p-8 sticky top-32">
                    <h3 class="text-[10px] font-black uppercase tracking-[0.3em] mb-8 border-b border-gray-800 pb-4 text-[#4d78c0]">Summary</h3>
                    <div class="flex justify-between items-end mb-10">
                        <p class="text-[9px] text-gray-500 uppercase font-bold">Total Amount</p>
                        <h2 class="text-2xl font-black tracking-tighter" th:text="${'GMD ' + total}">GMD 0</h2>
                    </div>
                    <a href="/checkout" class="block w-full bg-[#4d78c0] py-5 text-[10px] font-black uppercase tracking-[0.2em] text-center hover:bg-white hover:text-black transition duration-700">
                        Checkout Now →
                    </a>
                </div>
            </div>
        </div>
    </main>
    <div th:replace="~{fragments/footer :: footer}"></div>
</body>
<div th:replace="~{fragments/loading :: loading}"></div>
</html>
