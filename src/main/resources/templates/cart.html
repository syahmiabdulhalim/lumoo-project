<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>LUMOO | Your Cart</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-12">
    <div class="max-w-4xl mx-auto bg-white p-8 shadow-sm">
        <h1 class="text-2xl font-black mb-8">SHOPPING CART</h1>
        
        <table class="w-full text-left mb-8">
            <tr class="border-b text-[10px] uppercase text-gray-400">
                <th class="py-4">Material</th>
                <th>Price</th>
                <th>Qty</th>
                <th>Subtotal</th>
            </tr>
            <tr th:each="item : ${cart}" class="border-b text-sm">
                <td th:text="${item.name}" class="py-4 font-bold"></td>
                <td th:text="${'GMD ' + item.price}"></td>
                <td th:text="${item.quantity}"></td>
                <td th:text="${'GMD ' + (item.price * item.quantity)}"></td>
            </tr>
        </table>

        <form th:action="@{/checkout}" method="get" class="text-right">
    <button type="submit" class="bg-blue-600 text-white px-12 py-4 text-xs font-bold uppercase tracking-widest hover:bg-blue-700 transition">
        Proceed to Checkout
    </button>
</form>
    </div>
</body>
</html>
