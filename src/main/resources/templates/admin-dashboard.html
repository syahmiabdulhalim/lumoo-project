<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>LUMOO | Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/lumoo.css">
</head>
<body class="bg-gray-100">
    <div class="max-w-4xl mx-auto mt-10 p-6 bg-white shadow-md rounded-lg">
        <h1 class="text-2xl font-bold mb-6 border-b pb-4">Admin: Verify & Onboard Sellers</h1>
        
        <table class="w-full text-left">
            <thead>
                <tr class="bg-gray-200">
                    <th class="p-3">Username</th>
                    <th class="p-3">Email</th>
                    <th class="p-3">Status</th>
                    <th class="p-3">Action</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="user : ${users}" th:if="${user.role.name() == 'VENDOR'}" class="border-b">
                    <td class="p-3" th:text="${user.username}"></td>
                    <td class="p-3" th:text="${user.email}"></td>
                    <td class="p-3">
                        <span th:if="${user.verified}" class="text-green-600 font-bold">VERIFIED</span>
                        <span th:unless="${user.verified}" class="text-red-600 font-bold">PENDING</span>
                    </td>
                    <td class="p-3">
                        <form th:if="${!user.verified}" th:action="@{/admin/verify/{id}(id=${user.id})}" method="post">
                            <button type="submit" class="bg-[#4d78c0] text-white px-4 py-1 rounded hover:bg-[#3d68b0]">Approve</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
    <div th:replace="~{fragments/loading :: loading}"></div>
</body>
</html>
