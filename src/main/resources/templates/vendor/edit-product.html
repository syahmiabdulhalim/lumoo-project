<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>LUMOO | Edit Material</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-[#f9f9f9] text-gray-900 font-['Inter']">

    <nav class="flex justify-between items-center px-12 py-6 bg-white shadow-sm border-b border-gray-100">
        <h1 class="text-2xl font-black tracking-tighter text-blue-600">LUMOO <span class="text-xs font-normal text-gray-400 ml-2">VENDOR</span></h1>
        <a href="/" class="text-[10px] font-bold uppercase tracking-widest text-gray-400 hover:text-black transition">Back to Store</a>
    </nav>

    <div class="max-w-2xl mx-auto mt-20 p-12 bg-white border border-gray-100 shadow-2xl">
        <div class="mb-10">
            <h2 class="text-3xl font-light tracking-tight italic">Update <span class="font-bold text-blue-600">Material</span></h2>
            <p class="text-[10px] text-gray-400 uppercase tracking-widest mt-2">Modify product details for the marketplace</p>
        </div>

        <form th:action="@{/vendor/edit-product/{id}(id=${product.id})}" th:object="${product}" method="post" class="space-y-8">
            <div>
                <label class="block text-[10px] uppercase tracking-widest font-bold text-gray-400 mb-2">Material Name</label>
                <input type="text" th:field="*{name}" class="w-full border-b border-gray-200 py-2 focus:border-blue-600 outline-none transition text-sm bg-transparent" required>
            </div>

            <div class="grid grid-cols-2 gap-8">
                <div>
                    <label class="block text-[10px] uppercase tracking-widest font-bold text-gray-400 mb-2">Category</label>
                    <select th:field="*{category}" class="w-full border-b border-gray-200 py-2 focus:border-blue-600 outline-none transition text-sm bg-transparent cursor-pointer">
                        <option value="Cement">Cement</option>
                        <option value="Steel">Steel</option>
                        <option value="Tools">Tools</option>
                        <option value="Hardware">Hardware</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[10px] uppercase tracking-widest font-bold text-gray-400 mb-2">Price (Dalasi)</label>
                    <input type="number" step="0.01" th:field="*{price}" class="w-full border-b border-gray-200 py-2 focus:border-blue-600 outline-none transition text-sm bg-transparent" required>
                </div>
            </div>

            <div>
                <label class="block text-[10px] uppercase tracking-widest font-bold text-gray-400 mb-2">Image URL</label>
                <input type="text" th:field="*{imageUrl}" class="w-full border-b border-gray-200 py-2 focus:border-blue-600 outline-none transition text-sm bg-transparent">
            </div>

            <div class="flex items-center gap-4">
                <button type="submit" class="flex-1 bg-blue-600 text-white py-4 text-xs font-bold uppercase tracking-[0.2em] hover:bg-blue-700 transition duration-500 shadow-lg mt-4">
                    Save Changes
                </button>
                <a href="/" class="py-4 text-xs font-bold uppercase tracking-[0.2em] text-gray-400 hover:text-black mt-4 text-center">
                    Cancel
                </a>
            </div>
        </form>
    </div>
    <div th:replace="~{fragments/loading :: loading}"></div>
</body>
</html>
