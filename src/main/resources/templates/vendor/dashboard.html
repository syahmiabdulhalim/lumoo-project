<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>LUMOO | Vendor Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/lumoo.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body class="bg-[#f4f6fb] text-gray-900 font-['Nunito_Sans']">

<!-- Top nav -->
<nav class="bg-white border-b border-slate-100 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 flex items-center justify-between h-14">
        <div class="flex items-center gap-6">
            <a href="/">
                <img th:src="@{/images/logo.jpg}" alt="LUMOO" class="h-8 w-auto object-contain">
            </a>
            <span class="text-[10px] uppercase tracking-widest font-black text-slate-400">Vendor Hub</span>
        </div>
        <div class="flex items-center gap-4">
            <a href="/vendor/add-product"
               class="flex items-center gap-1.5 bg-[#4d78c0] hover:bg-[#3d68b0] text-white text-[10px] font-black uppercase tracking-wider px-4 py-2 rounded-lg transition">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"/></svg>
                Add Product
            </a>
            <div th:replace="~{fragments/bell :: bell}"></div>
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="text-[10px] font-bold uppercase tracking-wider text-slate-400 hover:text-red-500 transition">Logout</button>
            </form>
        </div>
    </div>
</nav>

<div class="max-w-7xl mx-auto px-6 py-8">

    <!-- Header -->
    <div class="mb-8">
        <h1 class="text-2xl font-black text-slate-800">
            Welcome back, <span class="text-[#4d78c0]" th:text="${vendorName}">Vendor</span>
        </h1>
        <p class="text-xs text-slate-400 mt-1 uppercase tracking-widest">Your store at a glance</p>
    </div>

    <!-- Flash message -->
    <div th:if="${flashMsg != null}"
         th:classappend="${flashType == 'green' ? 'bg-emerald-50 border-emerald-200 text-emerald-700' : 'bg-red-50 border-red-200 text-red-700'}"
         class="mb-6 border rounded-lg px-4 py-3 text-sm font-medium"
         th:text="${flashMsg}"></div>

    <!-- Stat cards -->
    <div class="grid grid-cols-2 lg:grid-cols-5 gap-4 mb-8">
        <div class="bg-white rounded-xl border border-slate-200 p-5">
            <p class="text-[9px] text-slate-400 uppercase font-black tracking-widest mb-2">Total Revenue</p>
            <p class="text-xl font-black text-[#4d78c0]"
               th:text="'GMD ' + ${#numbers.formatDecimal(totalRevenue, 1, 2)}">GMD 0.00</p>
        </div>
        <div class="bg-white rounded-xl border border-slate-200 p-5">
            <p class="text-[9px] text-slate-400 uppercase font-black tracking-widest mb-2">This Month</p>
            <p class="text-xl font-black text-emerald-600"
               th:text="'GMD ' + ${#numbers.formatDecimal(monthlySales, 1, 2)}">GMD 0.00</p>
        </div>
        <div class="bg-white rounded-xl border border-slate-200 p-5">
            <p class="text-[9px] text-slate-400 uppercase font-black tracking-widest mb-2">Total Orders</p>
            <p class="text-xl font-black text-slate-800" th:text="${totalSalesCount}">0</p>
        </div>
        <div class="bg-white rounded-xl border border-slate-200 p-5">
            <p class="text-[9px] text-slate-400 uppercase font-black tracking-widest mb-2">Avg Order</p>
            <p class="text-xl font-black text-slate-800"
               th:text="'GMD ' + ${#numbers.formatDecimal(averageOrder, 1, 2)}">GMD 0.00</p>
        </div>
        <div class="bg-white rounded-xl border border-slate-200 p-5">
            <p class="text-[9px] text-slate-400 uppercase font-black tracking-widest mb-2">Products</p>
            <p class="text-xl font-black text-slate-800" th:text="${totalProducts}">0</p>
        </div>
    </div>

    <!-- Alert strip: orders needing action -->
    <div th:if="${paidCount > 0 or returnCount > 0}"
         class="mb-6 flex flex-wrap gap-3">
        <div th:if="${paidCount > 0}"
             class="flex items-center gap-2 bg-amber-50 border border-amber-200 text-amber-700 rounded-lg px-4 py-2.5 text-xs font-bold cursor-pointer"
             onclick="switchTab('orders','PAID')">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            <span th:text="${paidCount} + ' order(s) ready to ship'">0 orders ready to ship</span>
            <span class="underline text-amber-600">Ship now →</span>
        </div>
        <div th:if="${returnCount > 0}"
             class="flex items-center gap-2 bg-orange-50 border border-orange-200 text-orange-700 rounded-lg px-4 py-2.5 text-xs font-bold cursor-pointer"
             onclick="switchTab('orders','RETURN_REQUESTED')">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6"/></svg>
            <span th:text="${returnCount} + ' return request(s) pending'">0 returns pending</span>
            <span class="underline text-orange-600">View →</span>
        </div>
    </div>

    <!-- Tab container -->
    <div class="bg-white rounded-xl border border-slate-200 overflow-hidden">
        <div class="flex border-b border-slate-100 overflow-x-auto">
            <button onclick="switchTab('orders')" id="tab-btn-orders"
                    class="tab-btn flex items-center gap-2 px-6 py-4 text-xs font-bold uppercase tracking-wider whitespace-nowrap border-b-2 transition-colors">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
                Orders
                <span th:if="${totalSalesCount > 0}"
                      class="bg-slate-100 text-slate-600 text-[9px] font-black px-1.5 py-0.5 rounded-full"
                      th:text="${totalSalesCount}">0</span>
                <span th:if="${paidCount > 0}"
                      class="bg-amber-400 text-white text-[9px] font-black px-1.5 py-0.5 rounded-full"
                      th:text="${paidCount} + ' to ship'">0</span>
            </button>
            <button onclick="switchTab('products')" id="tab-btn-products"
                    class="tab-btn flex items-center gap-2 px-6 py-4 text-xs font-bold uppercase tracking-wider whitespace-nowrap border-b-2 transition-colors">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
                Products
                <span class="bg-slate-100 text-slate-600 text-[9px] font-black px-1.5 py-0.5 rounded-full"
                      th:text="${totalProducts}">0</span>
            </button>
        </div>

        <!-- Tab panels -->
        <div id="tab-orders" class="tab-panel" data-src="/vendor/sections/orders">
            <div class="p-6 space-y-3 animate-pulse">
                <div th:each="i : ${#numbers.sequence(1,5)}" class="h-10 bg-slate-50 rounded"></div>
            </div>
        </div>
        <div id="tab-products" class="tab-panel hidden" data-src="/vendor/sections/products">
            <div class="p-6 space-y-3 animate-pulse">
                <div th:each="i : ${#numbers.sequence(1,4)}" class="h-10 bg-slate-50 rounded"></div>
            </div>
        </div>
    </div>

</div>

<footer class="text-center py-8 mt-4">
    <p class="text-[9px] text-slate-300 uppercase tracking-widest">© 2026 LUMOO Vendor Portal</p>
</footer>

<div th:replace="~{fragments/loading :: loading}"></div>

<script th:if="${flashMsg != null}" th:inline="javascript">
    window._lmFlash = { msg: /*[[${flashMsg}]]*/ '', type: /*[[${flashType ?: 'blue'}]]*/ 'blue' };
</script>

<script>
var loadedTabs = {};

function switchTab(name, statusFilter) {
    document.querySelectorAll('.tab-panel').forEach(function(p) { p.classList.add('hidden'); });
    document.querySelectorAll('.tab-btn').forEach(function(b) {
        b.classList.remove('border-[#4d78c0]', 'text-[#4d78c0]');
        b.classList.add('border-transparent', 'text-slate-500');
    });

    var panel = document.getElementById('tab-' + name);
    var btn   = document.getElementById('tab-btn-' + name);
    if (!panel || !btn) return;

    panel.classList.remove('hidden');
    btn.classList.remove('border-transparent', 'text-slate-500');
    btn.classList.add('border-[#4d78c0]', 'text-[#4d78c0]');

    var src = panel.dataset.src;
    if (statusFilter) {
        src = src + '?status=' + encodeURIComponent(statusFilter);
        loadedTabs[name] = false;
    }

    if (!loadedTabs[name] && src) {
        fetch(src, {credentials: 'same-origin'})
            .then(function(r) { return r.text(); })
            .then(function(html) {
                var tmp = document.createElement('div');
                tmp.innerHTML = html;
                panel.innerHTML = (tmp.firstElementChild || tmp).innerHTML;
                loadedTabs[name] = true;
                document.dispatchEvent(new Event('lm:sectionsUpdated'));
            })
            .catch(function() {
                panel.innerHTML = '<p class="text-xs text-red-400 p-6">Failed to load. <a href="" class="underline" onclick="loadedTabs[\'' + name + '\']=false;switchTab(\'' + name + '\');return false;">Retry</a></p>';
            });
    }

    history.replaceState(null, '', '/vendor/dashboard#' + name);
}

// Pagination + status filter links inside panels
document.addEventListener('click', function(e) {
    var link = e.target.closest('a[href^="/vendor/sections/"]');
    if (!link) return;
    e.preventDefault();
    var panel = link.closest('.tab-panel');
    if (!panel) return;
    var tabName = panel.id.replace('tab-', '');
    fetch(link.href, {credentials: 'same-origin'})
        .then(function(r) { return r.text(); })
        .then(function(html) {
            var tmp = document.createElement('div');
            tmp.innerHTML = html;
            panel.innerHTML = (tmp.firstElementChild || tmp).innerHTML;
            loadedTabs[tabName] = true;
            document.dispatchEvent(new Event('lm:sectionsUpdated'));
        });
});

(function() {
    var hash = window.location.hash.replace('#', '');
    switchTab(['orders','products'].includes(hash) ? hash : 'orders');
})();
</script>
</body>
</html>
