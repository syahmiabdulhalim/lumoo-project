<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="content">
    <div class="flex items-center justify-between px-6 py-4 border-b border-slate-100">
        <div>
            <p class="text-xs font-semibold text-slate-700">Your Products</p>
            <p class="text-[10px] text-slate-400 mt-0.5">All listings under your store</p>
        </div>
        <a href="/vendor/add-product"
           class="flex items-center gap-1.5 bg-[#4d78c0] hover:bg-[#3d68b0] text-white text-[10px] font-black uppercase tracking-wider px-3 py-2 rounded-lg transition">
            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"/></svg>
            Add Product
        </a>
    </div>

    <div class="overflow-x-auto">
        <table class="w-full text-sm" th:if="${products != null and !#lists.isEmpty(products)}">
            <thead>
                <tr class="bg-slate-50 border-b border-slate-100">
                    <th class="text-left px-6 py-3 text-[10px] font-black uppercase tracking-wider text-slate-400">Product</th>
                    <th class="text-left px-6 py-3 text-[10px] font-black uppercase tracking-wider text-slate-400">Category</th>
                    <th class="text-left px-6 py-3 text-[10px] font-black uppercase tracking-wider text-slate-400">Price</th>
                    <th class="text-left px-6 py-3 text-[10px] font-black uppercase tracking-wider text-slate-400">Stock</th>
                    <th class="text-left px-6 py-3 text-[10px] font-black uppercase tracking-wider text-slate-400">Status</th>
                    <th class="px-6 py-3"></th>
                </tr>
            </thead>
            <tbody class="divide-y divide-slate-50">
                <tr th:each="p : ${products}" class="hover:bg-slate-50/60 transition-colors align-middle">
                    <td class="px-6 py-4">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-lg overflow-hidden bg-slate-100 shrink-0">
                                <img th:if="${p.imageUrl != null}" th:src="${p.imageUrl}" th:alt="${p.name}"
                                     class="w-full h-full object-cover"
                                     onerror="this.style.display='none'">
                                <div th:if="${p.imageUrl == null}"
                                     class="w-full h-full flex items-center justify-center text-[8px] text-slate-300 font-bold uppercase">
                                    No img
                                </div>
                            </div>
                            <div>
                                <p class="text-xs font-bold text-slate-800" th:text="${p.name}">Name</p>
                                <p th:if="${p.description != null and !p.description.isBlank()}"
                                   class="text-[10px] text-slate-400 line-clamp-1 max-w-[180px]"
                                   th:text="${p.description}"></p>
                            </div>
                        </div>
                    </td>
                    <td class="px-6 py-4 text-[10px] text-slate-500 font-medium uppercase"
                        th:text="${p.category}"></td>
                    <td class="px-6 py-4 text-xs font-black text-[#4d78c0]"
                        th:text="${'GMD ' + #numbers.formatDecimal(p.price, 1, 2)}"></td>
                    <td class="px-6 py-4">
                        <span class="text-xs font-bold"
                              th:classappend="${p.stock == 0} ? 'text-red-500' : (${p.stock <= 5} ? 'text-amber-500' : 'text-slate-700')"
                              th:text="${p.stock}">0</span>
                        <span th:if="${p.stock == 0}"
                              class="ml-1 text-[9px] font-black uppercase text-red-400">Out</span>
                        <span th:if="${p.stock > 0 and p.stock <= 5}"
                              class="ml-1 text-[9px] font-black uppercase text-amber-400">Low</span>
                    </td>
                    <td class="px-6 py-4">
                        <!-- Approved and image approved -->
                        <span th:if="${p.approved and p.imageApproved}"
                              class="inline-flex items-center gap-1 text-[9px] font-black uppercase tracking-wider px-2.5 py-1 rounded-full bg-emerald-100 text-emerald-700">
                            <svg class="w-2.5 h-2.5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/></svg>
                            Live
                        </span>
                        <!-- Approved but image pending -->
                        <span th:if="${p.approved and !p.imageApproved}"
                              class="inline-flex items-center gap-1 text-[9px] font-black uppercase tracking-wider px-2.5 py-1 rounded-full bg-orange-100 text-orange-700">
                            <svg class="w-2.5 h-2.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                            Image review
                        </span>
                        <!-- Not yet approved -->
                        <span th:if="${!p.approved}"
                              class="inline-flex items-center gap-1 text-[9px] font-black uppercase tracking-wider px-2.5 py-1 rounded-full bg-amber-100 text-amber-700">
                            <svg class="w-2.5 h-2.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                            Pending approval
                        </span>
                    </td>
                    <td class="px-6 py-4">
                        <div class="flex items-center gap-3 justify-end">
                            <a th:href="@{/vendor/edit-product/{id}(id=${p.id})}"
                               class="text-[10px] font-black text-[#4d78c0] hover:underline uppercase">Edit</a>
                            <button type="button" class="btn-lm-delete text-[10px] font-black text-slate-300 hover:text-red-500 transition uppercase"
                                    data-title="Delete Product"
                                    th:data-msg="|Remove '${p.name}' from your store? Buyers will no longer see it.|"
                                    th:data-url="@{/vendor/delete-product/{id}(id=${p.id})}">Delete</button>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>

        <div th:if="${products == null or #lists.isEmpty(products)}" class="py-20 text-center">
            <svg class="w-10 h-10 text-slate-200 mx-auto mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
            <p class="text-xs text-slate-400 mb-3">No products listed yet</p>
            <a href="/vendor/add-product" class="text-[#4d78c0] font-bold text-xs hover:underline">List your first product →</a>
        </div>
    </div>
</div>
</body>
</html>
