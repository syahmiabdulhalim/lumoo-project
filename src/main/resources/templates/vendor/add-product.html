<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>LUMOO | Add New Material</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-[#f9f9f9] text-gray-900 font-['Inter']">

    <nav class="flex justify-between items-center px-12 py-6 bg-white shadow-sm">
        <h1 class="text-2xl font-black tracking-tighter">LUMOO <span class="text-xs font-normal text-gray-400 ml-2">VENDOR</span></h1>
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="text-xs font-bold uppercase tracking-widest text-red-600">Logout</button>
        </form>
    </nav>

    <div class="max-w-2xl mx-auto mt-20 p-12 bg-white border border-gray-100 shadow-xl">
        <div class="mb-10">
            <h2 class="text-3xl font-light tracking-tight">Add New <span class="font-bold italic">Material</span></h2>
            <p class="text-xs text-gray-400 uppercase tracking-widest mt-2">List your building materials for the modern city</p>
        </div>

        <form th:action="@{/vendor/add-product}" th:object="${product}" method="post" class="space-y-8">
    <div>
        <label class="block text-[10px] uppercase tracking-widest font-bold text-gray-400 mb-2">Material Name</label>
        <input type="text" th:field="*{name}" class="w-full border-b border-gray-200 py-2 focus:border-black outline-none transition text-sm bg-transparent" placeholder="e.g. Portland Cement" required>
    </div>

    <div class="grid grid-cols-2 gap-8">
        <div>
            <label class="block text-[10px] uppercase tracking-widest font-bold text-gray-400 mb-2">Category</label>
            <select th:field="*{category}" class="w-full border-b border-gray-200 py-2 focus:border-black outline-none transition text-sm bg-transparent cursor-pointer">
                <option value="Cement">Cement</option>
                <option value="Steel">Steel</option>
                <option value="Tools">Tools</option>
                <option value="Hardware">Hardware</option>
            </select>
        </div>
        <div>
            <label class="block text-[10px] uppercase tracking-widest font-bold text-gray-400 mb-2">Price (Dalasi)</label>
            <input type="number" step="0.01" th:field="*{price}" class="w-full border-b border-gray-200 py-2 focus:border-black outline-none transition text-sm bg-transparent" placeholder="0.00" required>
        </div>
    </div>

    <div>
        <label class="block text-[10px] uppercase tracking-widest font-bold text-gray-400 mb-2">Image URL</label>
        <input type="text" th:field="*{imageUrl}" class="w-full border-b border-gray-200 py-2 focus:border-black outline-none transition text-sm bg-transparent" placeholder="https://images.unsplash.com/...">
    </div>

    <button type="submit" class="w-full bg-black text-white py-4 text-xs font-bold uppercase tracking-[0.2em] hover:bg-gray-800 transition duration-500 shadow-xl mt-4">
        Publish to Store
    </button>
</form>
    </div>

</body>
</html>
