<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>LUMOO | Add New Material</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/lumoo.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body class="bg-[#f9f9f9] text-gray-900 font-['Nunito_Sans']">
    <nav class="flex justify-between items-center px-12 py-6 bg-white shadow-sm">
        <h1 class="text-2xl font-black tracking-tighter">LUMOO <span class="text-xs font-normal text-gray-400 ml-2">VENDOR</span></h1>
        <div class="flex items-center gap-8 text-[10px] uppercase font-bold tracking-widest">
            <a href="/vendor/dashboard" class="text-gray-400 hover:text-black transition">← Dashboard</a>
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="text-red-500 hover:text-red-700">Logout</button>
            </form>
        </div>
    </nav>
    <div class="max-w-2xl mx-auto mt-16 mb-20 p-12 bg-white border border-gray-100 shadow-xl">
        <div class="mb-10">
            <h2 class="text-3xl font-light tracking-tight">Add New <span class="font-bold italic">Material</span></h2>
            <p class="text-[9px] text-gray-400 uppercase tracking-widest mt-2">List your building materials for buyers across Gambia</p>
        </div>
        <div th:if="${flashMsg != null}" id="add-flash-toast"
             class="mb-6 flex items-center gap-3 px-4 py-3 text-white text-xs font-bold uppercase tracking-widest"
             th:classappend="${flashType == 'green'} ? 'bg-green-600' : 'bg-red-500'">
            <span th:text="${flashMsg}"></span>
            <button onclick="document.getElementById('add-flash-toast').remove()" class="ml-auto opacity-70 hover:opacity-100">✕</button>
        </div>
        <script th:if="${flashMsg != null}">
            setTimeout(() => { const t = document.getElementById('add-flash-toast'); if(t){t.style.opacity='0';t.style.transition='opacity .5s';setTimeout(()=>t.remove(),500);} }, 3000);
        </script>
        <form th:action="@{/vendor/add-product}" th:object="${product}" method="post"
              enctype="multipart/form-data" class="space-y-8">
            <div>
                <label class="block text-[9px] uppercase tracking-widest font-bold text-gray-400 mb-3">Material Name *</label>
                <input type="text" th:field="*{name}" required
                       class="w-full border-b border-gray-200 py-3 text-sm focus:border-[#1a2336] outline-none transition bg-transparent"
                       placeholder="e.g. Portland Cement 50kg">
            </div>
            <div class="grid grid-cols-2 gap-8">
                <div>
                    <label class="block text-[9px] uppercase tracking-widest font-bold text-gray-400 mb-3">Category *</label>
                    <select th:field="*{category}" required
                            class="w-full border-b border-gray-200 py-3 text-sm focus:border-[#1a2336] outline-none bg-transparent cursor-pointer">
                        <option value="">Select category...</option>
                        <option value="roofing">🏠 Roofing</option>
                        <option value="cement">🧱 Cement</option>
                        <option value="electrical">⚡ Electrical</option>
                        <option value="plumbing">🔧 Plumbing</option>
                        <option value="building">🏗️ Building</option>
                        <option value="timber">🪵 Timber</option>
                        <option value="paint">🎨 Paint</option>
                        <option value="hardware">🔩 Hardware</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[9px] uppercase tracking-widest font-bold text-gray-400 mb-3">Price (GMD) *</label>
                    <input type="number" step="0.01" th:field="*{price}" required
                           class="w-full border-b border-gray-200 py-3 text-sm focus:border-[#1a2336] outline-none transition bg-transparent"
                           placeholder="0.00">
                </div>
                <div>
                    <label class="block text-[9px] uppercase tracking-widest font-bold text-gray-400 mb-3">Stock Quantity *</label>
                    <input type="number" min="0" th:field="*{stock}" required
                           class="w-full border-b border-gray-200 py-3 text-sm focus:border-[#1a2336] outline-none transition bg-transparent"
                           placeholder="0">
                    <p class="text-[8px] text-gray-300 mt-1">Number of units available for sale.</p>
                </div>
            </div>
            <div>
                <label class="block text-[9px] uppercase tracking-widest font-bold text-gray-400 mb-3">Description</label>
                <textarea th:field="*{description}" rows="3"
                          class="w-full border-b border-gray-200 py-3 text-sm focus:border-[#1a2336] outline-none transition bg-transparent resize-none"
                          placeholder="Describe your product — specifications, uses, packaging, etc."></textarea>
            </div>
            <div>
                <label class="block text-[9px] uppercase tracking-widest font-bold text-gray-400 mb-3">Product Image</label>
                <div class="border border-dashed border-gray-200 p-6 bg-gray-50 space-y-4">
                    <div>
                        <p class="text-[8px] text-gray-400 uppercase tracking-wider mb-2">Upload a photo</p>
                        <input type="file" name="image" accept="image/*"
                               class="text-xs text-gray-500 file:mr-4 file:py-2 file:px-4 file:border-0 file:text-xs file:font-bold file:uppercase file:tracking-wider file:bg-[#1a2336] file:text-white hover:file:bg-[#4d78c0] file:cursor-pointer file:transition">
                        <p class="text-[8px] text-gray-300 mt-2">Max 5MB. JPG, PNG or WEBP.</p>
                    </div>
                    <div class="border-t border-gray-200 pt-4">
                        <p class="text-[8px] text-gray-400 uppercase tracking-wider mb-2">Or paste an image URL</p>
                        <input type="text" th:field="*{imageUrl}"
                               class="w-full border-b border-gray-200 py-2 text-xs focus:border-[#1a2336] outline-none transition bg-transparent"
                               placeholder="https://example.com/image.jpg">
                    </div>
                    <p class="text-[8px] text-[#4d78c0]">⏳ Your image will be reviewed by admin before going live.</p>
                </div>
            </div>
            <button type="submit"
                    class="w-full bg-[#1a2336] text-white py-4 text-[10px] font-black uppercase tracking-[0.3em] hover:bg-[#4d78c0] transition duration-500 mt-4">
                Submit for Review →
            </button>
        </form>
    </div>
    <div th:replace="~{fragments/loading :: loading}"></div>
</body>
</html>
